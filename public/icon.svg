<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>

    <!-- Container background: cream-ivory radial -->
    <radialGradient id="bg" cx="38%" cy="32%" r="70%">
      <stop offset="0%"   stop-color="#FFFEF9"/>
      <stop offset="55%"  stop-color="#FFFBF0"/>
      <stop offset="100%" stop-color="#FFF4D6"/>
    </radialGradient>

    <!-- Gold: 7-stop, top-left to bottom-right light source -->
    <linearGradient id="gold" x1="18%" y1="6%" x2="82%" y2="94%">
      <stop offset="0%"   stop-color="#FFF59C"/>
      <stop offset="14%"  stop-color="#F5D76E"/>
      <stop offset="32%"  stop-color="#D4AF37"/>
      <stop offset="50%"  stop-color="#C9A227"/>
      <stop offset="68%"  stop-color="#B8870C"/>
      <stop offset="84%"  stop-color="#9A6E08"/>
      <stop offset="100%" stop-color="#7A5506"/>
    </linearGradient>

    <!-- Inner depth on B face -->
    <linearGradient id="goldInner" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%"   stop-color="#FFFDE0" stop-opacity="0.55"/>
      <stop offset="40%"  stop-color="#F5D76E" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#C9A227" stop-opacity="0"/>
    </linearGradient>

    <!-- Diagonal specular shine -->
    <linearGradient id="shine" x1="8%" y1="2%" x2="62%" y2="60%">
      <stop offset="0%"   stop-color="#FFFFFF" stop-opacity="0.82"/>
      <stop offset="28%"  stop-color="#FFFFFF" stop-opacity="0.30"/>
      <stop offset="60%"  stop-color="#FFFFFF" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>

    <!-- Shine on B letterform -->
    <linearGradient id="shineB" x1="10%" y1="0%" x2="55%" y2="55%">
      <stop offset="0%"   stop-color="#FFFFFF" stop-opacity="0.60"/>
      <stop offset="40%"  stop-color="#FFFFFF" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>

    <!-- Gold rim gradient -->
    <linearGradient id="rim" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#E8D070" stop-opacity="0.90"/>
      <stop offset="50%"  stop-color="#C9A227" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#8A6510" stop-opacity="0.80"/>
    </linearGradient>

    <!-- Drop shadow for B -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="9" stdDeviation="9" flood-color="#5A3A00" flood-opacity="0.35"/>
    </filter>

    <!-- Clip to rounded-rect -->
    <clipPath id="clip">
      <rect x="0" y="0" width="512" height="512" rx="118"/>
    </clipPath>

  </defs>

  <!-- Container background -->
  <rect x="0" y="0" width="512" height="512" rx="118" fill="url(#bg)"/>

  <!-- Gold outer rim -->
  <rect x="4" y="4" width="504" height="504" rx="116" fill="none" stroke="url(#rim)" stroke-width="7.5"/>

  <!-- White inner rim — coin edge depth -->
  <rect x="10" y="10" width="492" height="492" rx="110" fill="none" stroke="#FFFFFF" stroke-width="5" stroke-opacity="0.65"/>

  <g clip-path="url(#clip)">

    <!--
      B letterform — compound path (evenodd).
      Coordinates scaled ×5.12 from the 100×100 viewBox version.

      Outer silhouette (stem + two bumps):
        Stem x=118→185, full height y=67→451
        Top bump: rightmost x=400 at y≈159
        Bottom bump: rightmost x=415 at y≈358 (slightly larger)

      Top counter (hole): x=185→338, y=118→210
      Bottom counter (hole): x=185→354, y=256→410
    -->
    <path
      fill-rule="evenodd"
      fill="url(#gold)"
      filter="url(#shadow)"
      d="
        M 118,67 H 261
        C 358,67 400,107 400,159
        C 400,210 358,246 287,256
        C 369,266 415,307 415,358
        C 415,415 364,451 261,451
        H 118 Z
        M 185,118 H 251
        C 318,118 338,138 338,159
        C 338,190 318,210 251,210
        H 185 Z
        M 185,256 H 261
        C 333,256 354,282 354,358
        C 354,400 333,410 261,410
        H 185 Z
      "
    />

    <!-- Inner depth layer -->
    <path
      fill-rule="evenodd"
      fill="url(#goldInner)"
      d="
        M 118,67 H 261
        C 358,67 400,107 400,159
        C 400,210 358,246 287,256
        C 369,266 415,307 415,358
        C 415,415 364,451 261,451
        H 118 Z
        M 185,118 H 251
        C 318,118 338,138 338,159
        C 338,190 318,210 251,210
        H 185 Z
        M 185,256 H 261
        C 333,256 354,282 354,358
        C 354,400 333,410 261,410
        H 185 Z
      "
    />

    <!-- Shine highlight on B stroke -->
    <path
      fill="none"
      stroke="url(#shineB)"
      stroke-width="26"
      stroke-linecap="round"
      d="M 143,82 H 256 C 338,82 379,113 379,159 C 379,200 348,231 292,246"
    />

    <!-- Container diagonal shine overlay -->
    <rect x="0" y="0" width="512" height="512" rx="118" fill="url(#shine)"/>

  </g>
</svg>
